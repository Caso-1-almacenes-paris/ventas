server:
  port: 8085

spring:
  application:
    name: ventas

  datasource:
    url: ${VENTAS_DB_URL:jdbc:postgresql://ep-mute-band-anlf1eyt-pooler.c-6.us-east-1.aws.neon.tech/ventasdb?sslmode=require}
    username: ${VENTAS_DB_USER:neondb_owner}
    password: ${VENTAS_DB_PASS:npg_TrxfdWBpS47F}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# URLs de los servicios que consume ventas vía RestClient
services:
  clientes:
    url: ${CLIENTES_URL:http://localhost:8081}
  productos:
    url: ${PRODUCTOS_URL:http://localhost:8082}

# Comisión del marketplace (10%)
ventas:
  tasa-comision: 0.10

# Configuración de Swagger / OpenAPI
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

# Registro en Eureka (no evaluado en EP2, util para el API Gateway del equipo)
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: https://eureka-server-wp64.onrender.com/eureka/
  instance:
    prefer-ip-address: false
    hostname: ${RENDER_EXTERNAL_HOSTNAME:localhost}
    secure-port-enabled: true
    secure-port: 443
    non-secure-port-enabled: false
    home-page-url: https://${RENDER_EXTERNAL_HOSTNAME}/
    status-page-url: https://${RENDER_EXTERNAL_HOSTNAME}/actuator/info
    health-check-url: https://${RENDER_EXTERNAL_HOSTNAME}/actuator/health